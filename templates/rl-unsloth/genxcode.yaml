template: rl-unsloth
name: rl_unsloth
rl_variant: grpo
model_name: unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit
max_seq_length: 2048
max_prompt_length: 512
max_completion_length: 1024
load_in_4bit: true
dtype: ""
lora_r: 16
lora_alpha: 16
lora_dropout: 0
lora_target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
use_gradient_checkpointing: unsloth
use_rslora: false
loftq_config: false
dataset_name: argilla/dpo-mix-7k
beta: 0.1
loss_type: sigmoid
label_smoothing: 0.0
num_generations: 8
temperature: 0.7
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
num_train_epochs: 1
max_steps: -1
lr: 0.00005
weight_decay: 0.01
warmup_ratio: 0.1
warmup_steps: 0
lr_scheduler_type: cosine
optim: adamw_8bit
max_grad_norm: 1.0
bf16: true
fp16: false
logging_steps: 10
save_steps: 500
save_total_limit: 3
seed: 3407
output_dir: ./output
push_to_hub: false
hub_model_id: ""
hub_token: ""
save_method: merged_16bit
