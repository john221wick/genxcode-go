template: finetuning-huggingface
name: finetune_hf
model_name: meta-llama/Llama-3.1-8B
dataset_name: tatsu-lab/alpaca
dataset_text_field: text
max_seq_length: 2048
packing: false
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
load_in_4bit: false
load_in_8bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
num_train_epochs: 3
max_steps: -1
lr: 0.0002
weight_decay: 0.01
warmup_ratio: 0.03
warmup_steps: 0
lr_scheduler_type: cosine
optim: adamw_torch
max_grad_norm: 1.0
bf16: true
fp16: false
gradient_checkpointing: true
logging_steps: 10
save_steps: 500
save_total_limit: 3
eval_steps: 500
eval_strategy: steps
output_dir: ./output
push_to_hub: false
hub_model_id: ""
hub_token: ""
report_to: tensorboard
seed: 42
num_proc: 4
chat_template: none
system_prompt: ""
