template: rl-huggingface
name: rl_hf
rl_variant: dpo
model_name: meta-llama/Llama-3.1-8B-Instruct
ref_model_name: ""
reward_model_name: ""
dataset_name: argilla/dpo-mix-7k
max_seq_length: 2048
max_prompt_length: 512
max_completion_length: 1024
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
load_in_4bit: false
load_in_8bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
beta: 0.1
loss_type: sigmoid
label_smoothing: 0.0
num_generations: 8
temperature: 0.7
reward_weights: ""
kto_desirable_weight: 1.0
kto_undesirable_weight: 1.0
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
num_train_epochs: 1
max_steps: -1
lr: 0.00005
weight_decay: 0.01
warmup_ratio: 0.1
warmup_steps: 0
lr_scheduler_type: cosine
optim: adamw_torch
max_grad_norm: 1.0
bf16: true
fp16: false
gradient_checkpointing: true
logging_steps: 10
save_steps: 500
save_total_limit: 3
eval_steps: 500
eval_strategy: steps
output_dir: ./output
push_to_hub: false
hub_model_id: ""
hub_token: ""
report_to: tensorboard
seed: 42
